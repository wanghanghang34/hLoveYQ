<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>护你周全 · 注册</title>
  <link rel="stylesheet" th:href="@{/css/app.css}" />
  <link rel="manifest" th:href="@{/manifest.webmanifest}" />
  <meta name="theme-color" content="#F472B6" />
</head>

<body class="min-h-screen bg-gradient-to-b from-[#FFF7ED] via-white to-white text-slate-900">
  <main class="mx-auto max-w-md px-4 py-10">
    <div class="text-center">
      <div class="mx-auto h-12 w-12 rounded-3xl bg-pink-400/20 grid place-items-center">
        <span class="text-pink-600 font-semibold text-lg">周</span>
      </div>
      <h1 class="mt-4 text-2xl font-semibold tracking-tight">创建你的护你周全</h1>
      <p class="mt-1 text-slate-600">从今天开始，温柔地记录自己。</p>
    </div>

    <div class="mt-6 rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
      <div th:if="${registerError}" class="mb-4 rounded-2xl bg-rose-50 border border-rose-200 p-3 text-sm text-rose-800"
           th:text="${registerError}">
        注册失败
      </div>

      <form th:action="@{/register}" th:object="${form}" method="post" class="space-y-4">
        <div>
          <label class="text-sm text-slate-600">邮箱</label>
          <input th:field="*{email}" type="email" autocomplete="email" required
                 class="mt-1 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 outline-none focus:ring-4 focus:ring-pink-200 focus:border-pink-300" />
          <p class="mt-1 text-xs text-rose-700" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">邮箱错误</p>
        </div>

        <div>
          <label class="text-sm text-slate-600">昵称</label>
          <input th:field="*{nickname}" type="text" autocomplete="nickname" required
                 class="mt-1 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 outline-none focus:ring-4 focus:ring-pink-200 focus:border-pink-300" />
          <p class="mt-1 text-xs text-rose-700" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}">昵称错误</p>
        </div>

        <div>
          <label class="text-sm text-slate-600">密码</label>
          <input th:field="*{password}" type="password" autocomplete="new-password" required
                 class="mt-1 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 outline-none focus:ring-4 focus:ring-pink-200 focus:border-pink-300" />
          <p class="mt-1 text-xs text-rose-700" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">密码错误</p>
          <p class="mt-1 text-xs text-slate-500">建议 6 位以上，越长越安全。</p>
        </div>

        <button type="submit"
                class="w-full rounded-2xl bg-pink-600 text-white py-3 font-medium hover:bg-pink-500">
          注册
        </button>
      </form>

      <div class="mt-5 text-center text-sm text-slate-600">
        已有账号？
        <a th:href="@{/login}" class="text-pink-700 hover:text-pink-600 font-medium">去登录</a>
      </div>
    </div>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/service-worker.js'));
    }
  </script>
</body>
</html>
