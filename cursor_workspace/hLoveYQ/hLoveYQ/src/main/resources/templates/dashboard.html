<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('护你周全 · 仪表盘')}"></head>
<body th:replace="~{fragments/layout :: shell('dashboard', ~{::main})}">
<main>
  <section class="mb-6">
    <h1 class="text-2xl sm:text-3xl font-semibold tracking-tight">仪表盘</h1>
    <p class="mt-1 text-slate-600">
      <span th:text="${vm.nickname}">你</span>，今天也要好好照顾自己。
    </p>
  </section>

  <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
    <div class="rounded-3xl border border-slate-200 bg-white p-5">
      <div class="text-sm text-slate-500">下次可能来访</div>
      <div class="mt-2 text-2xl font-semibold">
        <span th:text="${vm.nextStartDate != null ? #temporals.format(vm.nextStartDate,'MM-dd') : '—'}">—</span>
        <span class="text-sm font-normal text-slate-500">（±3 天）</span>
      </div>
      <p class="mt-2 text-sm text-slate-600" th:if="${vm.nextStartFrom != null && vm.nextStartTo != null}"
         th:text="'大约在 ' + ${#temporals.format(vm.nextStartFrom,'MM-dd')} + ' ~ ' + ${#temporals.format(vm.nextStartTo,'MM-dd')} + ' 之间'">
        大约在 — ~ — 之间
      </p>
      <p class="mt-2 text-sm text-slate-600" th:if="${vm.lastPeriodStart == null}">
        先新增一条开始日期，预测会更贴近你。
      </p>
    </div>

    <div class="rounded-3xl border border-slate-200 bg-white p-5">
      <div class="text-sm text-slate-500">平均周期</div>
      <div class="mt-2 flex items-end gap-2">
        <div class="text-3xl font-semibold" th:text="${vm.avgCycleDays != null ? vm.avgCycleDays : '—'}">—</div>
        <div class="text-slate-500 mb-1">天</div>
      </div>
      <p class="mt-2 text-sm text-slate-600">只是参考，不必被数字绑住。</p>
    </div>

    <div class="rounded-3xl border border-slate-200 bg-white p-5">
      <div class="text-sm text-slate-500">最近一次</div>
      <div class="mt-2 text-sm text-slate-700" th:if="${vm.lastPeriodStart != null}">
        <div>
          <span th:text="${#temporals.format(vm.lastPeriodStart,'yyyy-MM-dd')}">—</span>
          <span th:if="${vm.lastPeriodEnd != null}">
            ~ <span th:text="${#temporals.format(vm.lastPeriodEnd,'yyyy-MM-dd')}">—</span>
          </span>
        </div>
        <div class="mt-1 text-slate-600" th:if="${vm.lastPeriodLenDays != null}" th:text="'共 ' + ${vm.lastPeriodLenDays} + ' 天'">共 — 天</div>
        <div class="mt-1 text-slate-600" th:if="${vm.lastPeriodEnd == null}">还在进行中，记得多休息。</div>
      </div>
      <div class="mt-2 text-sm text-slate-600" th:if="${vm.lastPeriodStart == null}">
        暂无记录
      </div>
    </div>
  </section>

  <section class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <a th:href="@{/records/new}" class="rounded-3xl border border-pink-100 bg-gradient-to-br from-pink-50 to-white p-5 hover:shadow-sm">
      <div class="font-medium">新增一条记录</div>
      <p class="mt-1 text-sm text-slate-600">从开始日期起步就很好。</p>
    </a>
    <a th:href="@{/insights}" class="rounded-3xl border border-slate-200 bg-white p-5 hover:shadow-sm">
      <div class="font-medium">查看洞察</div>
      <p class="mt-1 text-sm text-slate-600">把最近 12 次轻轻总结给你。</p>
    </a>
  </section>

  <footer class="mt-8">
    <div class="text-xs text-slate-500 leading-relaxed">
      <div class="rounded-2xl border border-slate-200 bg-white/60 p-4">
        本应用仅用于记录与参考，不替代医疗建议。如有明显不适或担忧，请及时咨询专业医生。
      </div>
    </div>
  </footer>
</main>
</body>
</html>
